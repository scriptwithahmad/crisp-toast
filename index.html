<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crisp Toast Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        background: #f9fafb;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #030712; color: #f9fafb; }
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: 1px solid #d1d5db;
        background: white;
        color: black;
        border-radius: 0.375rem;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        button { background: #1f2937; color: white; border-color: #374151; }
      }
    </style>
  </head>
  <body>
    <h1>Crisp Toast</h1>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
